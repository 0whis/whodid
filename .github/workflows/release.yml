name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

env:
  PACKAGE: whodid

jobs:
  # ── .deb ──────────────────────────────────────────────────────────────────
  build-deb:
    name: Build .deb (Debian/Ubuntu)
    runs-on: ubuntu-latest
    outputs:
      deb-file: ${{ steps.build.outputs.deb-file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc make dpkg-dev

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        id: build
        run: |
          ./build-deb.sh --version "${{ steps.version.outputs.version }}"
          echo "deb-file=$(ls whodid_*.deb)" >> "$GITHUB_OUTPUT"

      - name: Verify .deb
        run: dpkg-deb --info whodid_*.deb

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: "*.deb"
          retention-days: 7

  # ── .rpm ──────────────────────────────────────────────────────────────────
  build-rpm:
    name: Build .rpm (Fedora/RHEL/openSUSE)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc make rpm-build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .rpm
        run: ./build-rpm.sh --version "${{ steps.version.outputs.version }}"

      - name: Verify .rpm
        run: rpm -qip whodid-*.rpm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: "*.rpm"
          retention-days: 7

  # ── AppImage ──────────────────────────────────────────────────────────────
  build-appimage:
    name: Build AppImage (universal Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc make libfuse2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ./build-appimage.sh --version "${{ steps.version.outputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: "*.AppImage"
          retention-days: 7

  # ── AUR PKGBUILD ──────────────────────────────────────────────────────────
  build-aur:
    name: Generate AUR PKGBUILD (Arch Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download source tarball and compute SHA256
        id: sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARBALL_URL="https://github.com/${{ github.repository }}/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          # Retry up to 5 times — GitHub may take a moment to create the archive
          for attempt in 1 2 3 4 5; do
            if curl -sSL --retry 3 --retry-delay 5 \
                    -o "/tmp/whodid-${VERSION}.tar.gz" \
                    "${TARBALL_URL}"; then
              break
            fi
            echo "Attempt ${attempt} failed, retrying in 10s…"
            sleep 10
          done
          SHA256="$(sha256sum "/tmp/whodid-${VERSION}.tar.gz" | awk '{print $1}')"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "tarball_url=${TARBALL_URL}" >> "$GITHUB_OUTPUT"

      - name: Generate PKGBUILD
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"
          TARBALL_URL="${{ steps.sha256.outputs.tarball_url }}"
          cat > PKGBUILD <<EOF
          # Maintainer: 0whis <0whis@users.noreply.github.com>
          pkgname=whodid
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc='Real-time file-system activity monitor (fanotify-based, shows PID + process per event)'
          arch=('x86_64' 'aarch64' 'armv7h')
          url='https://github.com/${{ github.repository }}'
          license=('custom')
          makedepends=('gcc' 'make')
          source=("whodid-\${pkgver}.tar.gz::${TARBALL_URL}")
          sha256sums=('${SHA256}')

          build() {
              cd "\${srcdir}/whodid-\${pkgver}"
              make
          }

          package() {
              cd "\${srcdir}/whodid-\${pkgver}"
              make DESTDIR="\${pkgdir}" PREFIX=/usr install
          }
          EOF

      - name: Generate .SRCINFO
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha256.outputs.sha256 }}"
          TARBALL_URL="${{ steps.sha256.outputs.tarball_url }}"
          cat > .SRCINFO <<EOF
          pkgbase = whodid
          	pkgdesc = Real-time file-system activity monitor (fanotify-based, shows PID + process per event)
          	pkgver = ${VERSION}
          	pkgrel = 1
          	url = https://github.com/${{ github.repository }}
          	arch = x86_64
          	arch = aarch64
          	arch = armv7h
          	license = custom
          	makedepends = gcc
          	makedepends = make
          	source = whodid-${VERSION}.tar.gz::${TARBALL_URL}
          	sha256sums = ${SHA256}

          pkgname = whodid
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aur
          path: |
            PKGBUILD
            .SRCINFO
          retention-days: 7

  # ── Sign and release ───────────────────────────────────────────────────────
  release:
    name: Sign artifacts and publish GitHub Release
    needs: [build-deb, build-rpm, build-appimage, build-aur]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4.1.3
        with:
          merge-multiple: true
          path: dist/

      - name: List collected artifacts
        run: ls -lh dist/

      - name: Import GPG signing key
        id: gpg
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --import
          # Extract the key fingerprint for later use
          FINGERPRINT="$(gpg --with-colons --import-options show-only \
            --import <<< "${GPG_PRIVATE_KEY}" \
            | awk -F: '/^fpr/{print $10; exit}')"
          echo "fingerprint=${FINGERPRINT}" >> "$GITHUB_OUTPUT"
          # Export the public key for inclusion in the release
          gpg --armor --export "${FINGERPRINT}" > dist/signing-key.pub.asc
          echo "GPG key imported: ${FINGERPRINT}"

      - name: Sign artifacts with GPG
        if: ${{ secrets.GPG_PRIVATE_KEY != '' }}
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_FINGERPRINT: ${{ steps.gpg.outputs.fingerprint }}
        run: |
          cd dist/
          for f in *.deb *.rpm *.AppImage; do
            [[ -f "${f}" ]] || continue
            echo "${GPG_PASSPHRASE}" | gpg --batch --yes \
              --passphrase-fd 0 \
              --pinentry-mode loopback \
              --local-user "${GPG_FINGERPRINT}" \
              --detach-sign --armor \
              "${f}"
            echo "  Signed: ${f} → ${f}.asc"
          done

      - name: Compute SHA-256 checksums
        run: |
          cd dist/
          sha256sum *.deb *.rpm *.AppImage 2>/dev/null | tee SHA256SUMS
          echo ""
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.deb.asc
            dist/*.rpm
            dist/*.rpm.asc
            dist/*.AppImage
            dist/*.AppImage.asc
            dist/PKGBUILD
            dist/.SRCINFO
            dist/SHA256SUMS
            dist/signing-key.pub.asc
