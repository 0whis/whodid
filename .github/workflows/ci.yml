name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          languages: c-cpp
          queries: security-and-quality

      - name: Build
        run: make

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          category: /language:c-cpp

  static-analysis:
    name: Static analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cppcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=all \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --inline-suppr \
            whodid.c 2>&1 | tee cppcheck.txt

      - name: Upload cppcheck results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cppcheck-results
          path: cppcheck.txt
          retention-days: 30

  build-and-harden:
    name: Build and hardening check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc make checksec

      - name: Build
        run: make

      - name: Hardening check
        run: |
          echo "=== Binary hardening analysis ==="
          checksec --file=whodid
          checksec --file=whodid --output=json | tee checksec.json
          echo ""
          echo "=== Expected protections ==="
          echo "  RELRO:    Full   (Wl,-z,relro -Wl,-z,now)"
          echo "  Stack:    Yes    (-fstack-protector-strong)"
          echo "  NX:       Yes    (default on x86_64)"
          echo "  PIE:      Yes    (-fPIE -pie)"
          echo "  Fortify:  Yes    (-D_FORTIFY_SOURCE=2)"

      - name: Upload checksec results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: checksec-results
          path: checksec.json
          retention-days: 30

  build-deb-test:
    name: Test .deb build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gcc make dpkg-dev

      - name: Build .deb
        run: ./build-deb.sh

      - name: Verify .deb metadata
        run: dpkg-deb --info whodid_*.deb

      - name: Verify .deb contents
        run: dpkg-deb --contents whodid_*.deb
